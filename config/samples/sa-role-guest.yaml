apiVersion: v1
kind: ServiceAccount
metadata:
  name: guest-sa
  namespace: host
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: guest-manager
rules:
- apiGroups: ["opg.ewbi.nby.one"] 
  resources: ["federations", "federations/status"] 
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: guest-binding
  namespace: host
subjects:
- kind: ServiceAccount
  name: guest-sa
  namespace: host
roleRef:
  kind: ClusterRole
  name: guest-manager
  apiGroup: rbac.authorization.k8s.io